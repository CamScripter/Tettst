<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM2 Dupe - Mego Tools</title>
    <style>
        :root {
            --bg-color: #0b140d;
            --card-color: #132217;
            --accent-green: #2ecc71;
            --accent-hover: #27ae60;
            --text-color: #ffffff;
            --input-bg: #1b3222;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Üst Menü / Navbar */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background-color: var(--card-color);
            padding: 12px 30px;
            border-radius: 30px;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .navbar a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .navbar a:hover {
            color: var(--text-color);
        }

        .navbar .brand {
            color: var(--text-color);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar .brand::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
        }

        /* Ana Panel */
        .container {
            background-color: var(--card-color);
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
            margin-top: 50px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--accent-green);
            font-weight: bold;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid #25442e;
            border-radius: 6px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-green);
        }

        /* Cloudflare Doğrulama Kutusu Simülasyonu */
        .captcha-box {
            background-color: #181c19;
            border: 1px solid #2d332f;
            padding: 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .captcha-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .captcha-verify {
            width: 18px;
            height: 18px;
            background-color: var(--accent-green);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #181c19;
            font-weight: bold;
            font-size: 12px;
        }

        .captcha-right {
            text-align: right;
            font-size: 10px;
            color: #707070;
        }

        /* Gönder Butonu */
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: #0b140d;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="navbar">
        <span class="brand">Mego Tools</span>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Start</a>
        <a href="#">Tutorial</a>
        <a href="#">FAQ</a>
    </div>

    <div class="container">
        <h2>Murder Mystery 2 Duper</h2>
        
        <form id="discordForm">
            <div class="input-group">
                <label for="kullaniciMesaji">MM2 FILE</label>
                <input type="text" id="kullaniciMesaji" placeholder="Paste Your MM2 File..." required>
            </div>

            <div class="captcha-box">
                <div class="captcha-left">
                    <div class="captcha-verify">✓</div>
                    <span>Success!</span>
                </div>
                <div class="captcha-right">
                    <span style="font-weight: bold; color: #e67e22;">CLOUDFLARE</span><br>
                    <span>Privacy - Terms</span>
                </div>
            </div>

            <button type="submit">Start Process 🚀</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
